<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DMV Housing — Overview</title>
  <link rel="stylesheet" href="tokens.css" />
  <style>
    body { margin: 0; background: var(--bg-paper); }
    /* Recharts override: ensure tabular nums on tooltip */
    .recharts-default-tooltip { font-variant-numeric: tabular-nums; }
    /* Hide focus rings on non-keyboard interactions */
    *:focus:not(:focus-visible) { outline: none; box-shadow: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@19/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@19/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="map.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [page, setPage] = useState("home");

      const handlePickCounty = (fips) => {
        // No county page yet — show a friendly placeholder
        const c = window.COUNTIES.find(x => x.fips === fips);
        alert(`County detail for ${c.name} (${fips})\n\nThe County page is the next deliverable. Click "OK" to keep exploring.`);
      };

      return (
        <div data-screen-label="01 Overview">
          <window.SiteHeader current="home" onNav={setPage} />
          <window.HomePage onPickCounty={handlePickCounty} />
          <window.SiteFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
