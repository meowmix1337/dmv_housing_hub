name: Ingest weekly

# FRED (mortgage rates update every Thursday) and Redfin (weekly TSV, Wednesdays).
on:
  schedule:
    - cron: '0 17 * * 4'  # 17:00 UTC = 13:00 ET, Thursdays
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ingest FRED
        run: npm run ingest:fred --workspace=scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Ingest Redfin
        run: npm run ingest:redfin --workspace=scripts

      - name: Transform → per-county JSON
        run: npm run transform --workspace=scripts

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "data: weekly refresh (fred, redfin)"
            git push
          fi
