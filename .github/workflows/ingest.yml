name: Ingest

# Single monthly run that ingests every source, transforms, and commits.
# Upstream cadences vary (see DATA_SOURCES.md); running every source in one
# job keeps the transform output complete because every source cache is
# present at transform time.
on:
  schedule:
    - cron: '0 14 5 * *'  # 14:00 UTC = 10:00 ET, 5th of each month
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # PAT belonging to a repo admin (on the ruleset bypass list) so the
          # commit step can push directly to main. The default GITHUB_TOKEN
          # acts as github-actions[bot], which is blocked by branch rules.
          token: ${{ secrets.INGEST_PUSH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ingest all sources
        run: npm run ingest --workspace=scripts -- --all
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}

      - name: Transform → per-county JSON
        run: npm run transform --workspace=scripts

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          if git diff --staged --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "data: monthly refresh"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push failed, retrying ($i)..."
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after retries" >&2
          exit 1
