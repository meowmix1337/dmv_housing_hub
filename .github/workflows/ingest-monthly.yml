name: Ingest monthly

# FRED (Realtor.com hotness/listing series), BLS (LAUS unemployment), Zillow (ZHVI/ZORI).
on:
  schedule:
    - cron: '0 14 5 * *'  # 14:00 UTC = 10:00 ET, 5th of each month
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ingest FRED
        run: npm run ingest:fred --workspace=scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Ingest BLS
        run: npm run ingest:bls --workspace=scripts
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}

      - name: Ingest Zillow
        run: npm run ingest:zillow --workspace=scripts

      - name: Transform → per-county JSON
        run: npm run transform --workspace=scripts

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "data: monthly refresh (fred, bls, zillow)"
            git push
          fi
