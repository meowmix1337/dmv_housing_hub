name: Ingest quarterly

# FRED state-level FHFA HPI updates quarterly (DCSTHPI, MDSTHPI, VASTHPI).
on:
  schedule:
    - cron: '0 14 15 1,4,7,10 *'  # 14:00 UTC, 15th of Jan/Apr/Jul/Oct
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ingest FRED
        run: npm run ingest:fred --workspace=scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Transform → per-county JSON
        run: npm run transform --workspace=scripts

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "data: quarterly refresh (fred state HPI)"
            git push
          fi
