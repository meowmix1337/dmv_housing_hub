name: Ingest quarterly

# FRED state-level FHFA HPI updates quarterly (DCSTHPI, MDSTHPI, VASTHPI).
on:
  schedule:
    - cron: '0 14 15 1,4,7,10 *'  # 14:00 UTC, 15th of Jan/Apr/Jul/Oct
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ingest FRED
        run: npm run ingest:fred --workspace=scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Transform → per-county JSON
        run: npm run transform --workspace=scripts

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          if git diff --staged --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "data: quarterly refresh (fred state HPI)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push failed, retrying ($i)..."
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after retries" >&2
          exit 1
